services:
  app:
    image: joonas55/express-app
    ports:
      - 8080:8080
    container_name: express-app
  watchtower:
    image: nickfedor/watchtower
    environment:
      - WATCHTOWER_POLL_INTERVAL=60
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: express-app
    container_name: watchtower
    depends_on:
      - app
